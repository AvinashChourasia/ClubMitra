# Docker Compose runs our stateful infrastructure (Postgres + Redis).
# The Go app and Expo app run on your host machine during development.
#
# Usage:
#   docker compose up -d     # start in background
#   docker compose down      # stop (data is kept in the named volumes)
#   docker compose down -v   # stop AND wipe data

services:
  db:
    # postgis/postgis bundles PostgreSQL 16 + the PostGIS extension preinstalled.
    image: postgis/postgis:16-3.4
    container_name: clubmitra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clubmitra
      POSTGRES_PASSWORD: clubmitra
      POSTGRES_DB: clubmitra
    ports:
      # host:container. We expose on host port 5433 (not 5432) so this container
      # never collides with a local/Homebrew Postgres that may own 5432.
      # Connect from your machine at localhost:5433.
      - "5433:5432"
    volumes:
      # Named volume so your data survives `docker compose down`.
      - clubmitra_pgdata:/var/lib/postgresql/data
    healthcheck:
      # Lets other tools (and us) know when Postgres is actually ready
      # to accept connections, not just when the container has started.
      test: ["CMD-SHELL", "pg_isready -U clubmitra -d clubmitra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    # Redis powers the challenge leaderboards (sorted sets). It's a fast,
    # in-memory derived view; Postgres remains the durable source of truth.
    image: redis:7-alpine
    container_name: clubmitra_redis
    restart: unless-stopped
    ports:
      # Host 6380 (not Redis's default 6379) to avoid clashing with any local
      # Redis, mirroring how we remapped Postgres to 5433.
      - "6380:6379"
    volumes:
      # Persist to disk so a restart doesn't lose the cache. (Even if it did, we
      # can rebuild every leaderboard from Postgres — see the leaderboard pkg.)
      - clubmitra_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clubmitra_pgdata:
  clubmitra_redisdata:
